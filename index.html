<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#ef4444" />
    <meta name="vercel-toolbar-disabled" content="true" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Irmãos Pilar" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>Irmãos Pilar</title>
    <script>
      // Disable Vercel Toolbar and Speed Insights
      window.VERCEL_TOOLBAR_DISABLED = true;
      window.__VERCEL_TOOLBAR_DISABLED__ = true;
      window.VERCEL_SPEED_INSIGHTS_DISABLED = true;
      window.__VERCEL_SPEED_INSIGHTS_DISABLED__ = true;

      // Capture PWA Install Prompt EARLIEST possible
      window.deferredPrompt = null;
      window.addEventListener('beforeinstallprompt', (e) => {
        console.log('PWA: beforeinstallprompt event fired and captured');
        // Prevent the mini-infobar from appearing on mobile
        e.preventDefault();
        // Stash the event so it can be triggered later.
        window.deferredPrompt = e;
        // Dispatch a custom event for React components that are already loaded
        window.dispatchEvent(new CustomEvent('pwa-prompt-available', { detail: e }));
      });

      window.addEventListener('appinstalled', (evt) => {
        console.log('PWA: Application installed');
        window.deferredPrompt = null;
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
